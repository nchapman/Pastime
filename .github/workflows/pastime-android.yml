name: Pastime Android

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      # Install the NDK *before* pinning JDK 11.  Recent sdkmanager
      # versions are compiled for Java 17+ and crash with
      # UnsupportedClassVersionError under JDK 11.  ubuntu-24.04's
      # default JDK is fine for sdkmanager; gradle's JDK 11 pin is set
      # in the next step.
      - name: Install NDK r26.1
        run: |
          set -e
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;26.1.10909125"

      # Pinned to match pkg/android/phoenix/.mise.toml — AGP 4.2 + Gradle
      # 6.7.1 require JDK 8 or 11; JDK 17+ breaks processManifest.
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build aarch64 debug APK
        working-directory: pkg/android/phoenix
        run: |
          chmod +x ./gradlew
          ./gradlew assembleAarch64Debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pastime-aarch64-debug-${{ github.sha }}
          path: pkg/android/phoenix/build/outputs/apk/aarch64/debug/phoenix-aarch64-debug.apk
          if-no-files-found: error
