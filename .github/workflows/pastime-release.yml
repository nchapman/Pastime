name: Pastime Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.1.0-alpha.1). Leave blank to dry-run against the dispatched ref.'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version label
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=dryrun-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Install NDK r26.1
        run: |
          set -e
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;26.1.10909125"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "RELEASE_KEYSTORE_BASE64 secret is not set" >&2
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/pastime-release.jks"

      - name: Build aarch64 release APK
        working-directory: pkg/android/phoenix
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          set -e
          chmod +x ./gradlew
          ./gradlew assembleAarch64Release \
            -PRELEASE_STORE_FILE="$RUNNER_TEMP/pastime-release.jks" \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
            -PRELEASE_VERSION_NAME="${{ steps.tag.outputs.name }}"

      - name: Rename APK with tag
        id: apk
        run: |
          set -e
          SRC=pkg/android/phoenix/build/outputs/apk/aarch64/release/phoenix-aarch64-release.apk
          DST="pastime-${{ steps.tag.outputs.name }}-aarch64.apk"
          cp "$SRC" "$DST"
          echo "path=$DST" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.path }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${{ steps.tag.outputs.name }}"
          PRERELEASE_FLAG=""
          case "$TAG" in
            *-alpha*|*-beta*|*-rc*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "$TAG" "${{ steps.apk.outputs.path }}" \
            --title "Pastime $TAG" \
            --generate-notes \
            $PRERELEASE_FLAG

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/pastime-release.jks"
